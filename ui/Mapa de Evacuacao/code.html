<!DOCTYPE html>

<html class="light" lang="pt-MZ"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ROTA SEGURA MZ - Mapa de Emergência</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",

          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#5c4300",
                    "on-secondary-container": "#003567",

                    "on-primary-container": "#fff2f0",
                    "on-surface-variant": "#5b403d",
                    "inverse-primary": "#ffb3ac",
                    "error": "#ba1a1a",
                    "surface-container-low": "#fff0ef",
                    "primary-fixed-dim": "#ffb3ac",
                    "on-tertiary-container": "#fff3e3",
                    "on-secondary-fixed-variant": "#004786",
                    "tertiary": "#715300",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#ffe2de",
                    "primary-fixed": "#ffdad6",
                    "surface-container-highest": "#f9dcd9",
                    "surface-tint": "#ba1a20",
                    "background": "#fff8f7",
                    "on-surface": "#271816",
                    "on-tertiary-fixed": "#261a00",
                    "tertiary-container": "#8f6a00",
                    "secondary-container": "#54a0fe",
                    "tertiary-fixed": "#ffdfa0",
                    "on-error-container": "#93000a",
                    "outline": "#8f6f6c",
                    "inverse-surface": "#3e2c2a",
                    "on-primary-fixed": "#410003",
                    "surface": "#fff8f7",
                    "primary-container": "#d32f2f",
                    "tertiary-fixed-dim": "#f8bd2a",
                    "on-secondary-fixed": "#001c3a",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#930010",
                    "primary": "#af101a",
                    "surface-dim": "#f1d3d0",
                    "surface-variant": "#f9dcd9",
                    "inverse-on-surface": "#ffedeb",
                    "surface-container": "#ffe9e7",
                    "surface-bright": "#fff8f7",
                    "on-background": "#271816",
                    "secondary-fixed": "#d4e3ff",
                    "on-tertiary": "#ffffff",
                    "on-secondary": "#ffffff",
                    "secondary": "#005faf",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",

            "spacing": {
                    "stack-sm": "8px",
                    "stack-md": "16px",
                    "touch-target-min": "48px",
                    "gutter-mobile": "16px",
                    "gutter-desktop": "24px",
                    "stack-lg": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "button-text": ["Inter"],
                    "headline-md": ["Inter"],

                    "label-lg": ["Inter"],

                    "body-md": ["Inter"]

            "fontSize": {

                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-nav-pill {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Mobile-First Map Simulation */
        .map-canvas {
            height: calc(100vh - 160px);
            width: 100%;
        }
        .pulse-error {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { fill: rgba(186, 26, 26, 0.4); }
            50% { fill: rgba(186, 26, 26, 0.7); }
            100% { fill: rgba(186, 26, 26, 0.4); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-gutter-mobile h-touch-target-min bg-error dark:bg-error border-b-2 border-on-error-container">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-error" data-icon="warning">warning</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-error tracking-tight">ROTA SEGURA MZ</h1>
</div>
<div class="flex items-center">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-on-error/10 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-error" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="pt-12 pb-20 overflow-hidden relative">
<!-- Emergency Alert Banner (Sticky) -->
<div class="bg-primary-container text-on-primary-container p-4 flex items-center gap-4 z-40 sticky top-12 border-b-2 border-on-error-container">
<div class="bg-on-primary-container/20 p-2 rounded-full animate-pulse">
<span class="material-symbols-outlined" data-icon="emergency_home">emergency_home</span>
</div>
<div class="flex-1">
<p class="font-label-lg text-label-lg leading-tight uppercase tracking-widest opacity-80">Prioridade Máxima</p>
<p class="font-headline-md text-headline-md leading-none">ALERTA: Bairro Munhava em risco elevado. Evacue agora.</p>
</div>
</div>
<!-- Mode Indicator (Optimized for 3G) -->
<div class="absolute top-[132px] right-4 z-30">
<div class="bg-surface-container-highest px-3 py-1 rounded-full border border-outline flex items-center gap-2 shadow-sm">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="font-label-lg text-label-lg text-on-surface">Modo Económico Ativo</span>
</div>
</div>
<!-- Interactive Map Canvas -->
<div class="map-canvas relative bg-surface-dim overflow-hidden">
<!-- Simulated Map Visualization -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full grayscale opacity-50 contrast-125 bg-cover bg-center" data-location="Beira, Mozambique" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDek5041p30ykMKtIY0ZtpOoVhuqAEbQSOj3I_MllvXf_NSM4cY2P4RyYfYJfJTaJLB6zmpniw11c1WKheW5iET9jBXc3PLZbnWewC1oIo3ZmX4W-ye2FlC4jVomrfC_Tl0m54aI_Qu2gN8UN6JygtHwUXhpYaA58ItxH8vWcti3-JGA5Ub90bpKFBekiQJ982ouR1fUH7qxUE-WhSxGNZPBquo8UYUWPLGqu04hNG_YjnSF0xMAefiHoob8m90BDIL1uB7xEtnjK3l')"></div>
<!-- SVG Overlay for Danger Zones -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
<!-- Munhava Risk Zone -->
<path class="pulse-error" d="M50 150 L120 180 L140 250 L80 300 L40 240 Z" fill="#ba1a1a" fill-opacity="0.4" stroke="#ba1a1a" stroke-width="2"></path>
<!-- River Risk Zone -->
<path d="M250 400 L350 450 L320 550 L220 500 Z" fill="#ba1a1a" fill-opacity="0.3" stroke="#ba1a1a" stroke-width="2"></path>
</svg>
<!-- Map Pins (Shelters) -->
<div class="absolute top-[280px] left-[180px] group">
<div class="cursor-pointer flex flex-col items-center">
<div class="bg-tertiary-fixed text-on-tertiary-fixed p-1 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-[20px]" data-icon="house">house</span>
</div>
<div class="mt-1 bg-surface-container text-on-surface px-2 py-0.5 rounded text-[10px] font-bold border border-outline-variant">ESCOLA PRIMÁRIA</div>
</div>
</div>
<div class="absolute top-[520px] left-[260px] group">
<div class="cursor-pointer flex flex-col items-center">
<div class="bg-secondary-container text-on-secondary-container p-1 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-[20px]" data-icon="health_and_safety">health_and_safety</span>
</div>
<div class="mt-1 bg-surface-container text-on-surface px-2 py-0.5 rounded text-[10px] font-bold border border-outline-variant">CRUZ VERMELHA</div>
</div>
</div>
</div>
<!-- Floating Controls -->
<div class="absolute right-4 bottom-24 flex flex-col gap-3">
<button class="w-12 h-12 bg-surface text-primary rounded-lg border-2 border-outline flex items-center justify-center shadow-md active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 bg-surface text-on-surface rounded-lg border-2 border-outline flex items-center justify-center shadow-md active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</div>
</div>
<!-- Giant FAB -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 w-full px-gutter-mobile z-40 max-w-md">
<button class="w-full h-16 bg-secondary text-on-secondary rounded-xl flex items-center justify-center gap-3 shadow-[0_8px_32px_rgba(0,95,175,0.4)] active:scale-95 transition-all border-b-4 border-on-secondary-fixed-variant">
<span class="material-symbols-outlined text-[32px]" data-icon="directions_run" style="font-variation-settings: 'FILL' 1;">directions_run</span>
<span class="font-button-text text-button-text uppercase tracking-wide">Encontrar abrigo mais próximo</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-2 py-2 bg-surface border-t-2 border-outline-variant">
<!-- Mapa (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-90 transition-all duration-150" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-label-lg text-label-lg">Mapa</span>
</a>
<!-- Lista -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all" href="#">
<span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
<span class="font-label-lg text-label-lg">Lista</span>
</a>
<!-- Alertas -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all relative" href="#">
<span class="material-symbols-outlined" data-icon="notifications_active">notifications_active</span>
<span class="font-label-lg text-label-lg">Alertas</span>
<span class="absolute top-1 right-3 w-2 h-2 bg-error rounded-full ring-2 ring-surface"></span>
</a>
<!-- Staff -->
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high px-4 py-1 rounded-full transition-all" href="#">
<span class="material-symbols-outlined" data-icon="shield_person">shield_person</span>
<span class="font-label-lg text-label-lg">Staff</span>
</a>
</nav>
<script>
        // Simple Micro-interaction for the FAB
        const fab = document.querySelector('button.bg-secondary');
        fab.addEventListener('click', () => {
            fab.classList.add('bg-on-secondary-container');
            setTimeout(() => {
                fab.classList.remove('bg-on-secondary-container');
                alert('A calcular rota mais segura para Abrigo Munhava Central (2.4km)...');
            }, 200);
        });

        // Basic map panning simulation toggle
        let isPanning = false;
        const map = document.querySelector('.map-canvas');
        map.addEventListener('mousedown', () => isPanning = true);
        window.addEventListener('mouseup', () => isPanning = false);
    </script>
</body></html>
